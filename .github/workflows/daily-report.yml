name: Daily Discord report

on:
  schedule:
    # GitHub cron uses UTC and scheduled jobs can be delayed or occasionally missed.
    # Run several attempts across the Europe/Berlin evening report window; daily_report.py
    # sends only during 18:00-20:59 local time and records a daily marker to avoid duplicates.
    - cron: "5,20,35,50 16-19 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Send immediately even outside the normal report window"
        required: false
        type: boolean
        default: false

concurrency:
  group: monitor-state-writes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Sync latest state
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Refresh monitor state
        env:
          DATABASE_PATH: state/monitor.db
          RUN_ONCE: "true"
          POLL_SECONDS: "300"
          EXTERNAL_STORE_INTERVAL_SECONDS: "300"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCH_KEYWORDS: ${{ vars.WATCH_KEYWORDS }}
        run: python monitor.py
      - name: Refresh dashboard data
        env:
          DATABASE_PATH: state/monitor.db
        run: python export_dashboard.py
      - name: Send daily report
        env:
          DATABASE_PATH: state/monitor.db
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_DAILY_REPORT: ${{ inputs.force }}
        run: python daily_report.py
      - name: Persist state and report marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add state/monitor.db docs/status.json
          git diff --cached --quiet || git commit -m "Record daily Discord report"
          git push
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping failure alert"
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          import urllib.request
          payload = {"content": f"⚠️ Daily Discord report workflow failed: {os.environ['RUN_URL']}"}
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(f"Discord response: {response.status}")
          except Exception as error:
              print(f"Failed to send Discord failure alert: {error}")
          PY
