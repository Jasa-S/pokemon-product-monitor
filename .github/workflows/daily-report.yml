name: Daily Discord report

on:
  schedule:
    # GitHub cron uses UTC. These two candidates cover 18:00 Europe/Berlin
    # in both CET and CEST; daily_report.py sends only when local Berlin hour is 18.
    - cron: "5 16 * * *"
    - cron: "5 17 * * *"
  workflow_dispatch:

concurrency:
  group: daily-discord-report
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Send daily report
        env:
          DATABASE_PATH: state/monitor.db
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_DAILY_REPORT: ${{ github.event_name == 'workflow_dispatch' }}
        run: python daily_report.py
      - name: Persist report marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/monitor.db
          git diff --cached --quiet || git commit -m "Record daily Discord report"
          git push
