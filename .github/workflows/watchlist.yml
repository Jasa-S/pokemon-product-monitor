name: Update restock watchlist

on:
  issues:
    types: [opened]

concurrency:
  group: store-monitor
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: startsWith(github.event.issue.title, '[watch] ') || startsWith(github.event.issue.title, '[unwatch] ')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply request
        env:
          DATABASE_PATH: state/monitor.db
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python manage_watchlist.py "$ISSUE_TITLE"
      - name: Refresh dashboard data
        env:
          DATABASE_PATH: state/monitor.db
        run: python export_dashboard.py
      - name: Persist watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add watchlist.json docs/status.json
          git diff --cached --quiet || git commit -m "Update restock watchlist"
          git push
      - name: Confirm and close request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: gh issue close "$ISSUE_NUMBER" --comment "Watchlist updated. The dashboard and ten-minute monitor will use this selection shortly."
