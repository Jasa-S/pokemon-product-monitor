name: Monitor stores

on:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

concurrency:
  group: monitor-state-writes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Sync latest state
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check EU card shops
        env:
          DATABASE_PATH: state/monitor.db
          RUN_ONCE: "true"
          POLL_SECONDS: "300"
          EXTERNAL_STORE_INTERVAL_SECONDS: "300"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCH_KEYWORDS: ${{ vars.WATCH_KEYWORDS }}
        run: python monitor.py
      - name: Update Pages data
        env:
          DATABASE_PATH: state/monitor.db
        run: python export_dashboard.py
      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add state/monitor.db docs/status.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
