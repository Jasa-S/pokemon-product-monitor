name: Monitor stores

on:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

concurrency:
  group: monitor-state-writes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Sync latest state
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check EU card shops
        env:
          DATABASE_PATH: state/monitor.db
          RUN_ONCE: "true"
          POLL_SECONDS: "300"
          EXTERNAL_STORE_INTERVAL_SECONDS: "300"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCH_KEYWORDS: ${{ vars.WATCH_KEYWORDS }}
        run: python monitor.py
      - name: Update Pages data
        env:
          DATABASE_PATH: state/monitor.db
        run: python export_dashboard.py
      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add state/monitor.db docs/status.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.getenv("DISCORD_WEBHOOK_URL")
          if not webhook:
              print("DISCORD_WEBHOOK_URL is not configured; skipping failure alert")
              raise SystemExit(0)

          payload = {
              "embeds": [{
                  "title": "⚠️ TCG monitor workflow failed",
                  "description": f"{os.getenv('WORKFLOW_NAME')} failed.\n{os.getenv('RUN_URL')}",
                  "color": 0xF97316,
                  "footer": {"text": "GitHub Actions"},
              }]
          }
          try:
              request = urllib.request.Request(
                  webhook,
                  data=json.dumps(payload).encode(),
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(f"Discord response: {response.status}")
          except Exception as error:
              print(f"Failed to send Discord failure alert: {error}")
          PY
