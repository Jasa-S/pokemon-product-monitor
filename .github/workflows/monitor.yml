name: Monitor stores

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

concurrency:
  group: store-monitor
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check stores
        env:
          DATABASE_PATH: state/monitor.db
          RUN_ONCE: "true"
          CHECK_NAVER_PUBLIC: "false"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          WATCH_PRODUCT_NOS: ${{ vars.WATCH_PRODUCT_NOS }}
          WATCH_KEYWORDS: ${{ vars.WATCH_KEYWORDS }}
          WATCHLIST_PATH: watchlist.json
        run: python monitor.py
      - name: Update Pages data
        env:
          DATABASE_PATH: state/monitor.db
        run: python export_dashboard.py
      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/monitor.db docs/status.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
