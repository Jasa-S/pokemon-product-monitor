<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
  <title>TCG Monitor</title>
  <style>
    *{box-sizing:border-box}:root{color-scheme:light;font-family:Inter,system-ui,-apple-system,sans-serif;--bg:#fff;--text:#111827;--muted:#6b7280;--card:#f9fafb;--card-hover:#f0f0f0;--border:rgba(0,0,0,.07);--accent:#2563eb;--radius:.75rem;background:var(--bg);color:var(--text)}:root.dark{color-scheme:dark;--bg:#0a0a0a;--text:#fff;--muted:#a1a1aa;--card:#141414;--card-hover:#1e1e1e;--border:rgba(255,255,255,.07)}body{max-width:76rem;margin:auto;padding:3rem 1.5rem 5rem;background:var(--bg);color:var(--text);transition:background .3s,color .3s}header{display:flex;gap:1.25rem;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem}h1{margin:0;font-size:1.75rem;font-weight:600;display:flex;align-items:center}.brand-mark,.tool-icon{display:inline-flex;width:1.25rem;height:1.25rem;margin-right:.55rem;color:var(--accent)}.brand-mark svg,.tool-icon svg{display:block;width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}#meta{color:var(--muted);font-size:.78rem;margin-top:.55rem;line-height:1.45}.header-actions{display:flex;align-items:center;gap:.45rem;flex-shrink:0}.tool-btn{display:inline-flex;align-items:center;justify-content:center;gap:.35rem;min-height:2rem;padding:.4rem .7rem;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--muted);font:500 .72rem/1 Inter,system-ui,sans-serif;cursor:pointer;white-space:nowrap}.tool-btn:hover{color:var(--accent);background:var(--card-hover)}#theme-toggle .theme-sun{display:none}:root.dark #theme-toggle .theme-moon{display:none}:root.dark #theme-toggle .theme-sun{display:inline-flex}#view .view-list-icon{display:none}#view[aria-pressed="true"] .view-grid-icon{display:none}#view[aria-pressed="true"] .view-list-icon{display:inline-flex}.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;padding:.35rem;border:0;border-radius:999px;background:none;color:var(--muted);cursor:pointer;font-size:.95rem;transition:color .2s,transform .3s}.icon-btn:hover{color:var(--accent);transform:rotate(20deg) scale(1.12)}#filter-toggle{display:none}.monitor-card{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.75rem;border:1px solid var(--border);background:var(--card);border-radius:var(--radius);padding:.8rem 1rem;margin:0 0 1rem}.monitor-card strong{font-size:.82rem}.monitor-card span{color:var(--muted);font-size:.72rem}.health{display:grid;grid-template-columns:repeat(auto-fit,minmax(14rem,1fr));gap:.6rem;margin:0 0 1.1rem}.health-card{border:1px solid var(--border);background:var(--card);border-radius:var(--radius);padding:.75rem}.health-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.45rem}.health-store{font-size:.76rem;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.health-pill{padding:.18rem .45rem;border-radius:999px;font-size:.62rem;font-weight:700;white-space:nowrap;color:#15803d;background:rgba(21,128,61,.1)}.health-pill.fail{color:#b91c1c;background:rgba(220,38,38,.1)}.health-body{color:var(--muted);font-size:.68rem;line-height:1.55}.health-error{margin-top:.35rem;color:#b91c1c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.controls{display:grid;grid-template-columns:minmax(15rem,2fr) repeat(4,minmax(8rem,1fr)) repeat(2,minmax(7rem,.8fr)) auto;gap:.6rem;margin:0 0 1rem}.filters-title,.filters-close,.filters-done{display:none}input,select,button{font:inherit}.controls>*{width:100%;min-width:0;max-width:100%}.controls input,.controls select,.controls #clear,.filters-done{padding:.65rem .8rem;border-radius:.55rem;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.75rem}.controls input:focus,.controls select:focus{outline:2px solid var(--accent);outline-offset:1px}button{cursor:pointer}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(13.5rem,1fr));gap:.75rem}article{display:flex;flex-direction:column;border:1px solid var(--border);background:var(--card);border-radius:var(--radius);overflow:hidden;transition:background .2s,border-color .2s,transform .2s}article:hover{background:var(--card-hover);border-color:rgba(125,125,125,.3);transform:translateY(-2px)}.product-media{display:flex;aspect-ratio:1;align-items:center;justify-content:center;overflow:hidden;background:var(--card-hover)}.product-media img{width:100%;height:100%;object-fit:cover;background:white}.image-placeholder{color:var(--muted);font-size:1.5rem;opacity:.45}.body{display:flex;flex:1;flex-direction:column;padding:.85rem}h2{font-size:.9rem;line-height:1.35;min-height:2.45em;margin:0 0 .7rem;font-weight:600}a{color:inherit;text-decoration:none}.row{display:flex;justify-content:space-between;gap:.65rem;align-items:center}.badge{padding:.24rem .55rem;border-radius:999px;font-size:.68rem;color:#b91c1c;background:rgba(220,38,38,.1);white-space:nowrap}.badge.available{color:#15803d;background:rgba(21,128,61,.1)}.source{color:var(--muted);font-size:.66rem;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.35rem}.prices{display:flex;flex-direction:column}.eur{color:var(--muted);font-size:.7rem}#stats{margin:0 0 1.25rem;color:var(--muted);font-size:.72rem;line-height:1.45}#more{display:block;width:auto;margin:1.5rem auto 0}body.gallery #grid{grid-template-columns:repeat(auto-fill,minmax(9.75rem,1fr));gap:.5rem}body.gallery article{border-radius:.55rem}body.gallery .body{padding:.6rem}body.gallery h2{display:-webkit-box;min-height:2.15em;max-height:2.15em;margin-bottom:.5rem;overflow:hidden;font-size:.78rem;line-height:1.08;-webkit-box-orient:vertical;-webkit-line-clamp:2}body.gallery .row{align-items:flex-start;flex-direction:column;gap:.35rem;margin-top:auto}@media(max-width:1100px){#filter-toggle{display:inline-flex}.filters-title,.filters-close,.filters-done{display:flex}.filters-title{grid-column:1/-1;align-items:center;justify-content:space-between;color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}.filters-close{align-items:center;justify-content:center;width:2rem;height:2rem;border:0;border-radius:999px;background:var(--card-hover);color:var(--muted);font-size:1.1rem}.filters-done{grid-column:1/-1;justify-content:center;background:var(--accent);color:white;border-color:transparent;font-weight:700}.controls{display:none;position:fixed;z-index:100;top:4.25rem;left:1rem;right:1rem;width:auto;max-height:calc(100dvh - 5.5rem);overflow-y:auto;grid-template-columns:minmax(0,1fr);gap:.55rem;margin:0;padding:.85rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 .5rem 2rem rgba(0,0,0,.16)}body.filters-open .controls{display:grid}.controls>*{inline-size:100%;min-inline-size:0}#search{grid-column:auto}body.filters-open:before{content:"";position:fixed;z-index:90;inset:0;background:rgba(0,0,0,.25)}}@media(max-width:760px){body{padding:2.5rem 1rem 4rem;overflow-x:hidden}header{align-items:center;margin-bottom:1rem}h1{font-size:1.35rem}#meta{font-size:.68rem}.header-actions .tool-btn{width:2rem;padding:.4rem;border:0;background:none}.header-actions .tool-label{display:none}#grid{grid-template-columns:1fr;gap:.65rem}body.gallery #grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(prefers-reduced-motion:reduce){article{transition:none}.icon-btn:hover{transform:none}}
  </style>
</head>
<body>
  <header><div><h1><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="7" y="3" width="11" height="16" rx="2"/><path d="M10 7h5M10 11h5M5 7v12a2 2 0 0 0 2 2h7"/></svg></span>TCG Monitor</h1><div id="meta">Loading…</div></div><div class="header-actions"><button id="filter-toggle" class="tool-btn" type="button" aria-label="Open filters" aria-expanded="false" aria-controls="filters"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h10M18 7h2M4 17h2M10 17h10"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="17" r="2"/></svg></span><span class="tool-label">Filters</span></button><button id="view" class="tool-btn" type="button" aria-pressed="false"><span class="tool-icon view-grid-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span><span class="tool-icon view-list-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="5" cy="6" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="5" cy="18" r="1"/></svg></span><span id="view-label" class="tool-label">Gallery</span></button><button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle dark mode"><span id="theme-icon" class="tool-icon" aria-hidden="true"><svg class="theme-moon" viewBox="0 0 24 24"><path d="M20 15.2A8.5 8.5 0 0 1 8.8 4 8.5 8.5 0 1 0 20 15.2Z"/></svg><svg class="theme-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span></button></div></header>
  <section id="monitor-card" class="monitor-card"><strong>Automatic monitoring</strong><span>Scanning live stores every 5 minutes via GitHub Actions.</span></section>
  <section id="health" class="health" aria-label="Store health"></section>
  <div class="controls" id="filters"><div class="filters-title"><span>Filters</span><button id="filter-close" class="filters-close" type="button" aria-label="Close filters">×</button></div><input id="search" type="search" placeholder="Search name or product number…"><select id="source"><option value="">All stores</option></select><select id="currency"><option value="">Any currency</option><option value="EUR">EUR</option></select><select id="availability"><option value="">Any stock status</option><option value="available">In stock</option><option value="unavailable">Sold out</option></select><select id="sort"><option value="name">Name A–Z</option><option value="price-asc">Price: low to high</option><option value="price-desc">Price: high to low</option><option value="stock">In stock first</option></select><input id="minprice" type="number" min="0" step="1" placeholder="Min €"><input id="maxprice" type="number" min="0" step="1" placeholder="Max €"><button id="clear" type="button">Clear</button><button id="filters-done" class="filters-done" type="button">Show results</button></div>
  <div id="stats"></div><main id="grid"></main><button id="more" type="button" hidden>Show more products</button>
  <script>
    let products=[];let sources=[];let displayLimit=120;
    const configuredSources=['crazycards-onepiece','crazycards-pokemon','spielwaren-onepiece-kor','spielwaren-pokemon-kor'];
    const euros=new Intl.NumberFormat('en-IE',{style:'currency',currency:'EUR'});
    const esc=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const dt=value=>value?new Date(value):null;
    const time=value=>{const d=dt(value);return d&&!Number.isNaN(d)?d.toLocaleString():'Never'};
    const rel=value=>{const d=dt(value);if(!d||Number.isNaN(d))return 'never';const mins=Math.max(0,Math.round((Date.now()-d.getTime())/60000));if(mins<1)return 'just now';if(mins<60)return `${mins}m ago`;const hrs=Math.round(mins/60);return hrs<48?`${hrs}h ago`:`${Math.round(hrs/24)}d ago`};
    function setTheme(dark){document.documentElement.classList.toggle('dark',dark);document.querySelector('#theme-toggle').setAttribute('aria-pressed',String(dark));document.querySelector('#theme-toggle').setAttribute('aria-label',dark?'Use light mode':'Use dark mode');localStorage.setItem('theme',dark?'dark':'light')}
    function setFilters(open){document.body.classList.toggle('filters-open',open);document.querySelector('#filter-toggle').setAttribute('aria-expanded',String(open))}
    function setGallery(enabled){document.body.classList.toggle('gallery',enabled);const button=document.querySelector('#view');button.setAttribute('aria-pressed',String(enabled));button.setAttribute('aria-label',enabled?'Use details view':'Use gallery view');document.querySelector('#view-label').textContent=enabled?'Details':'Gallery';localStorage.setItem('galleryView',String(enabled))}
    function renderHealth(){const root=document.querySelector('#health');if(!sources.length){root.hidden=true;return}root.hidden=false;root.innerHTML=sources.map(s=>`<section class="health-card" title="Last scan: ${esc(time(s.checkedAt))}${s.failing?` · ${esc(s.errorMessage||'scan failing')}`:''}"><div class="health-head"><span class="health-store">${esc(s.source)}</span><span class="health-pill ${s.failing?'fail':''}">${s.failing?'Failing':'OK'}</span></div><div class="health-body">${Number(s.productCount||0).toLocaleString()} products · ${Number(s.availableCount||0).toLocaleString()} in stock<br>Last scan: ${esc(rel(s.checkedAt))}</div>${s.failing?`<div class="health-error">${esc(s.errorMessage||'Scan failed')}</div>`:''}</section>`).join('')}
    function renderMonitorCard(lastSuccess,failing){document.querySelector('#monitor-card').innerHTML=`<strong>Automatic monitoring</strong><span>Scans every 5 minutes · last successful scan ${lastSuccess?rel(lastSuccess.toISOString()):'unknown'}${failing?` · ${failing} store${failing>1?'s':''} failing`:''}</span>`}
    function render(){const q=document.querySelector('#search').value.toLocaleLowerCase();const source=document.querySelector('#source').value;const availability=document.querySelector('#availability').value;const minValue=document.querySelector('#minprice').value;const maxValue=document.querySelector('#maxprice').value;const min=minValue===''?0:Number(minValue);const max=maxValue===''?Infinity:Number(maxValue);const order=document.querySelector('#sort').value;const stockState=p=>p.stockStatus||(p.isSoldOut?'SOLD_OUT':'AVAILABLE');const matchesStock=p=>!availability||(availability==='available'&&stockState(p)==='AVAILABLE')||(availability==='unavailable'&&stockState(p)==='SOLD_OUT');const stockOrder={AVAILABLE:0,SOLD_OUT:1,UNKNOWN:2};const visible=products.filter(p=>(!source||p.source===source)&&(p.productName.toLocaleLowerCase().includes(q)||String(p.productNo).includes(q))&&matchesStock(p)&&((minValue===''&&maxValue==='')||(p.salePrice!=null&&p.salePrice>=min&&p.salePrice<=max)));visible.sort((a,b)=>order==='price-asc'?(a.salePrice??Infinity)-(b.salePrice??Infinity):order==='price-desc'?(b.salePrice??-1)-(a.salePrice??-1):order==='stock'?(stockOrder[stockState(a)]??9)-(stockOrder[stockState(b)]??9):a.productName.localeCompare(b.productName));const available=visible.filter(p=>stockState(p)==='AVAILABLE').length;const unavailable=visible.filter(p=>stockState(p)==='SOLD_OUT').length;const shown=visible.slice(0,displayLimit);document.querySelector('#stats').textContent=`Showing ${shown.length.toLocaleString()} of ${visible.length.toLocaleString()} matches · ${available.toLocaleString()} in stock · ${unavailable.toLocaleString()} sold out`;document.querySelector('#grid').innerHTML=shown.map(p=>{const state=stockState(p);const label=state==='SOLD_OUT'?'Sold out':'Available';const badge=state==='AVAILABLE'?'available':'';const primary=p.salePrice==null?'—':euros.format(p.salePrice);const media=p.image?.startsWith('https://')?`<img loading="lazy" src="${esc(p.image)}" alt="${esc(p.productName)}">`:'<span class="image-placeholder" aria-hidden="true">▧</span>';return `<article><a class="product-media" href="${p.url.startsWith('https://')?esc(p.url):'#'}" target="_blank" rel="noreferrer" aria-label="${esc(p.productName)}">${media}</a><div class="body"><div class="source">${esc(p.source)} · #${esc(p.productNo)}</div><h2><a href="${p.url.startsWith('https://')?esc(p.url):'#'}" target="_blank" rel="noreferrer">${esc(p.productName)}</a></h2><div class="row"><span class="prices"><strong>${primary}</strong><span class="eur">EUR shop price</span></span><span class="badge ${badge}">${esc(label)}</span></div></div></article>`}).join('');const more=document.querySelector('#more');more.hidden=shown.length===visible.length;more.textContent=`Show ${Math.min(120,visible.length-shown.length).toLocaleString()} more products`}
    fetch('status.json').then(r=>r.json()).then(data=>{products=(data.products||[]).filter(p=>configuredSources.includes(p.source));sources=(data.sources||configuredSources.map(source=>({source,productCount:products.filter(p=>p.source===source).length,availableCount:products.filter(p=>p.source===source&&p.stockStatus==='AVAILABLE').length,checkedAt:data.updatedAt,failing:false}))).filter(s=>configuredSources.includes(s.source));const lastSuccess=sources.filter(s=>!s.failing&&s.checkedAt).map(s=>new Date(s.checkedAt)).filter(d=>!Number.isNaN(d)).sort((a,b)=>b-a)[0];const failing=sources.filter(s=>s.failing).length;document.querySelector('#meta').textContent=`${products.length.toLocaleString()} tracked · updated ${new Date(data.updatedAt).toLocaleString()}`;renderMonitorCard(lastSuccess,failing);[...new Set([...configuredSources,...products.map(p=>p.source)])].sort().forEach(s=>document.querySelector('#source').insertAdjacentHTML('beforeend',`<option>${esc(s)}</option>`));renderHealth();render()}).catch(error=>{document.querySelector('#meta').textContent=`Status failed to load: ${error}`});
    ['search','source','availability','sort','minprice','maxprice'].forEach(id=>document.querySelector(`#${id}`).addEventListener(id==='search'||id.includes('price')?'input':'change',()=>{displayLimit=120;render()}));document.querySelector('#more').addEventListener('click',()=>{displayLimit+=120;render()});document.querySelector('#view').addEventListener('click',()=>setGallery(!document.body.classList.contains('gallery')));document.querySelector('#theme-toggle').addEventListener('click',()=>setTheme(!document.documentElement.classList.contains('dark')));document.querySelector('#filter-toggle').addEventListener('click',event=>{event.stopPropagation();setFilters(!document.body.classList.contains('filters-open'))});document.querySelector('#filter-close').addEventListener('click',()=>setFilters(false));document.querySelector('#filters-done').addEventListener('click',()=>setFilters(false));document.querySelector('#filters').addEventListener('click',event=>event.stopPropagation());document.addEventListener('click',event=>{if(document.body.classList.contains('filters-open')&&!event.target.closest('#filters')&&!event.target.closest('#filter-toggle'))setFilters(false)});document.addEventListener('keydown',event=>{if(event.key==='Escape')setFilters(false)});document.querySelector('#clear').addEventListener('click',()=>{['search','source','availability','minprice','maxprice'].forEach(id=>document.querySelector(`#${id}`).value='');document.querySelector('#sort').value='name';displayLimit=120;render()});const initialDark=document.documentElement.classList.contains('dark');document.querySelector('#theme-toggle').setAttribute('aria-pressed',String(initialDark));document.querySelector('#theme-toggle').setAttribute('aria-label',initialDark?'Use light mode':'Use dark mode');setGallery(localStorage.getItem('galleryView')===null?matchMedia('(max-width: 520px)').matches:localStorage.getItem('galleryView')==='true');
  </script>
</body>
</html>
