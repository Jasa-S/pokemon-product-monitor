<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
<title>TCG Monitor</title>
<style>
:root{color-scheme:light;font-family:Inter,system-ui,sans-serif;--bg:#fff;--text:#111827;--muted:#6b7280;--card:#f9fafb;--hover:#f0f0f0;--border:rgba(0,0,0,.08);--accent:#2563eb;--accent-soft:rgba(37,99,235,.1);--ok:#15803d;--bad:#b91c1c;background:var(--bg);color:var(--text)}:root.dark{color-scheme:dark;--bg:#0a0a0a;--text:#fff;--muted:#a1a1aa;--card:#141414;--hover:#1e1e1e;--border:rgba(255,255,255,.09);--accent-soft:rgba(59,130,246,.14)}*{box-sizing:border-box}body{max-width:76rem;margin:auto;padding:2.5rem 1.25rem 4rem;background:var(--bg);color:var(--text)}header{display:flex;justify-content:space-between;gap:1rem;align-items:center;margin-bottom:1rem}h1{display:flex;align-items:center;gap:.55rem;margin:0;font-size:1.7rem}.brand-mark{display:inline-flex;align-items:center;justify-content:center;width:1.55rem;height:1.55rem;border-radius:.45rem;background:var(--accent-soft);color:var(--accent)}.brand-mark svg,.tool-icon svg{display:block;width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.brand-mark svg{width:1.05rem;height:1.05rem}.actions{display:flex;gap:.45rem;align-items:center}.tool-btn{display:inline-flex;align-items:center;justify-content:center;gap:.38rem;min-height:2rem;padding:.42rem .75rem;border-radius:999px;border:1px solid rgba(37,99,235,.28);background:var(--accent-soft);color:var(--accent);font:750 .72rem/1 Inter,system-ui,sans-serif;cursor:pointer;white-space:nowrap}.tool-btn:hover{background:rgba(37,99,235,.16);border-color:rgba(37,99,235,.38)}.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;padding:.35rem;border:1px solid rgba(37,99,235,.18);border-radius:999px;background:var(--accent-soft);color:var(--accent);cursor:pointer}.icon-btn:hover{background:rgba(37,99,235,.16)}.tool-icon{display:inline-flex;width:1.05rem;height:1.05rem;color:currentColor}#theme .theme-sun{display:none}:root.dark #theme .theme-moon{display:none}:root.dark #theme .theme-sun{display:block}#view .view-list-icon{display:none}#view[aria-pressed="true"] .view-grid-icon{display:none}#view[aria-pressed="true"] .view-list-icon{display:inline-flex}#filter-toggle{display:none}.panel{border:1px solid var(--border);background:var(--card);border-radius:.75rem;padding:.7rem .85rem;margin:0 0 .65rem}.panel strong{font-size:.78rem}.panel span,.panel summary{color:var(--muted);font-size:.7rem}.health summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:.75rem;align-items:center}.health summary::-webkit-details-marker{display:none}.pills{display:flex;gap:.35rem;flex-wrap:wrap;justify-content:flex-end}.pill{font-size:.6rem;font-weight:800;border-radius:999px;padding:.16rem .42rem;color:var(--ok);background:rgba(21,128,61,.1)}.pill.fail{color:var(--bad);background:rgba(220,38,38,.1)}.health-lines{display:grid;grid-template-columns:repeat(auto-fit,minmax(13rem,1fr));gap:.4rem;margin-top:.55rem}.line{background:var(--hover);border-radius:.55rem;padding:.45rem;color:var(--muted);font-size:.68rem;line-height:1.45}.line.fail{color:var(--bad)}.controls{display:grid;grid-template-columns:minmax(15rem,2fr) repeat(4,minmax(8rem,1fr)) repeat(2,minmax(7rem,.8fr)) auto;gap:.55rem;margin:.85rem 0 1rem}.drawer-head,.drawer-done{display:none}input,select,.controls button{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:.55rem;padding:.65rem .75rem;font-size:.75rem}#stats{color:var(--muted);font-size:.72rem;margin:0 0 1rem}#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(13.5rem,1fr));gap:.75rem}article{border:1px solid var(--border);background:var(--card);border-radius:.75rem;overflow:hidden}article:hover{background:var(--hover)}.media{display:flex;align-items:center;justify-content:center;aspect-ratio:1;background:var(--hover)}.media img{width:100%;height:100%;object-fit:cover;background:white}.body{padding:.85rem}.src{color:var(--muted);font-size:.65rem;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.35rem}h2{font-size:.9rem;line-height:1.35;min-height:2.45em;margin:0 0 .7rem}a{color:inherit;text-decoration:none}.row{display:flex;justify-content:space-between;gap:.65rem;align-items:center}.price small{display:block;color:var(--muted);font-size:.68rem}.badge{border-radius:999px;padding:.24rem .55rem;font-size:.68rem;color:var(--bad);background:rgba(220,38,38,.1);white-space:nowrap}.badge.ok{color:var(--ok);background:rgba(21,128,61,.1)}body.gallery #grid{grid-template-columns:repeat(auto-fill,minmax(9.75rem,1fr));gap:.5rem}body.gallery h2{font-size:.78rem;line-height:1.1;min-height:2.2em;max-height:2.2em;overflow:hidden}@media(max-width:1100px){#filter-toggle{display:inline-flex}.drawer-head,.drawer-done{display:flex}.drawer-head{grid-column:1/-1;justify-content:space-between;align-items:center;color:var(--muted);font-size:.72rem;font-weight:800;text-transform:uppercase}.drawer-done{grid-column:1/-1;justify-content:center;background:var(--accent)!important;color:white!important;font-weight:800}.controls{display:none;position:fixed;z-index:10;top:4.25rem;left:1rem;right:1rem;max-height:calc(100dvh - 5.5rem);overflow:auto;grid-template-columns:1fr;background:var(--bg);border:1px solid var(--border);border-radius:.75rem;padding:.85rem;box-shadow:0 .5rem 2rem rgba(0,0,0,.18)}body.filters-open .controls{display:grid}body.filters-open:before{content:"";position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9}}@media(max-width:760px){body{padding:2rem 1rem 4rem}h1{font-size:1.35rem}.actions .label{display:none}.actions .tool-btn{width:2rem;padding:.42rem}#grid{grid-template-columns:1fr}.health summary{align-items:flex-start;flex-direction:column}.pills{justify-content:flex-start}body.gallery #grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<header><h1><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="7" y="3" width="11" height="16" rx="2"/><path d="M10 7h5M10 11h5M5 7v12a2 2 0 0 0 2 2h7"/></svg></span>TCG Monitor</h1><div class="actions"><button id="filter-toggle" class="tool-btn" type="button" aria-label="Open filters" aria-expanded="false" aria-controls="filters"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h10M18 7h2M4 17h2M10 17h10"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="17" r="2"/></svg></span><span class="label">Filters</span></button><button id="view" class="tool-btn" type="button" aria-pressed="false"><span class="tool-icon view-grid-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span><span class="tool-icon view-list-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="5" cy="6" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="5" cy="18" r="1"/></svg></span><span id="view-label" class="label">Gallery</span></button><button id="theme" class="icon-btn" type="button" aria-label="Toggle dark mode"><span class="tool-icon" aria-hidden="true"><svg class="theme-moon" viewBox="0 0 24 24"><path d="M20 15.2A8.5 8.5 0 0 1 8.8 4 8.5 8.5 0 1 0 20 15.2Z"/></svg><svg class="theme-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span></button></div></header>
<section id="monitor" class="panel"><strong>Automatic monitoring</strong><br><span>Loading monitor status…</span></section>
<details id="health" class="panel health"><summary><span><strong>Store health</strong><br><span id="health-meta">Loading…</span></span><span id="health-pills" class="pills"></span></summary><div id="health-lines" class="health-lines"></div></details>
<div id="filters" class="controls"><div class="drawer-head"><span>Filters</span><button id="filter-close" class="tool-btn" type="button">×</button></div><input id="search" type="search" placeholder="Search name or product number…"><select id="source"><option value="">All stores</option></select><select id="currency"><option value="">Any currency</option><option value="EUR">EUR</option></select><select id="availability"><option value="">Any stock status</option><option value="available">In stock</option><option value="unavailable">Sold out</option></select><select id="sort"><option value="name">Name A–Z</option><option value="price-asc">Price: low to high</option><option value="price-desc">Price: high to low</option><option value="stock">In stock first</option></select><input id="minprice" type="number" min="0" step="1" placeholder="Min €"><input id="maxprice" type="number" min="0" step="1" placeholder="Max €"><button id="clear" type="button">Clear</button><button id="filters-done" class="drawer-done" type="button">Show results</button></div>
<div id="stats"></div><main id="grid"></main>
<script>
let products=[],sources=[];const sourceIds=['crazycards-onepiece','crazycards-pokemon','spielwaren-onepiece-kor','spielwaren-pokemon-kor'];const euro=new Intl.NumberFormat('en-IE',{style:'currency',currency:'EUR'});const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const rel=v=>{const d=v?new Date(v):null;if(!d||Number.isNaN(d))return'never';const m=Math.max(0,Math.round((Date.now()-d.getTime())/60000));if(m<1)return'just now';if(m<60)return`${m}m ago`;const h=Math.round(m/60);return h<48?`${h}h ago`:`${Math.round(h/24)}d ago`};function stock(p){return p.stockStatus||(p.isSoldOut?'SOLD_OUT':'AVAILABLE')}function setFilters(open){document.body.classList.toggle('filters-open',open);document.querySelector('#filter-toggle').setAttribute('aria-expanded',String(open))}function setGallery(on){document.body.classList.toggle('gallery',on);document.querySelector('#view').setAttribute('aria-pressed',String(on));document.querySelector('#view-label').textContent=on?'Details':'Gallery';localStorage.setItem('galleryView',String(on))}function renderHealth(last,fail){const ok=sources.length-fail;document.querySelector('#health-meta').textContent=`${ok}/${sources.length||sourceIds.length} stores OK · last successful scan ${last?rel(last.toISOString()):'unknown'}`;document.querySelector('#health-pills').innerHTML=sources.map(s=>`<span class="pill ${s.failing?'fail':''}">${esc(s.source.replace('spielwaren-','spw-').replace('crazycards-','cc-'))}: ${s.failing?'FAIL':'OK'}</span>`).join('');document.querySelector('#health-lines').innerHTML=sources.map(s=>`<div class="line ${s.failing?'fail':''}"><strong>${esc(s.source)}</strong><br>${Number(s.productCount||0).toLocaleString()} products · ${Number(s.availableCount||0).toLocaleString()} in stock · scan ${esc(rel(s.checkedAt))}${s.errorMessage?`<br>${esc(s.errorMessage)}`:''}</div>`).join('')}function renderMonitor(data,last,fail){document.querySelector('#monitor').innerHTML=`<strong>Automatic monitoring</strong><br><span>${products.length.toLocaleString()} tracked · dashboard updated ${rel(data.updatedAt)} · scans every 5 minutes · daily Discord report at 18:00 Europe/Berlin · last successful scan ${last?rel(last.toISOString()):'unknown'}${fail?` · ${fail} store${fail>1?'s':''} failing`:''}</span>`}function render(){const q=document.querySelector('#search').value.toLowerCase(),src=document.querySelector('#source').value,av=document.querySelector('#availability').value,minv=document.querySelector('#minprice').value,maxv=document.querySelector('#maxprice').value,min=minv===''?0:Number(minv),max=maxv===''?Infinity:Number(maxv),order=document.querySelector('#sort').value;let visible=products.filter(p=>(!src||p.source===src)&&(p.productName.toLowerCase().includes(q)||String(p.productNo).includes(q))&&(!av||(av==='available'&&stock(p)==='AVAILABLE')||(av==='unavailable'&&stock(p)==='SOLD_OUT'))&&((minv===''&&maxv==='')||(p.salePrice!=null&&p.salePrice>=min&&p.salePrice<=max)));const rank={AVAILABLE:0,SOLD_OUT:1,UNKNOWN:2};visible.sort((a,b)=>order==='price-asc'?(a.salePrice??Infinity)-(b.salePrice??Infinity):order==='price-desc'?(b.salePrice??-1)-(a.salePrice??-1):order==='stock'?(rank[stock(a)]??9)-(rank[stock(b)]??9):a.productName.localeCompare(b.productName));const inStock=visible.filter(p=>stock(p)==='AVAILABLE').length,sold=visible.filter(p=>stock(p)==='SOLD_OUT').length;document.querySelector('#stats').textContent=`Showing ${visible.length.toLocaleString()} matches · ${inStock.toLocaleString()} in stock · ${sold.toLocaleString()} sold out`;document.querySelector('#grid').innerHTML=visible.map(p=>{const ok=stock(p)==='AVAILABLE',price=p.salePrice==null?'—':euro.format(p.salePrice),img=p.image?.startsWith('https://')?`<img loading="lazy" src="${esc(p.image)}" alt="${esc(p.productName)}">`:'▧';return`<article><a class="media" href="${p.url?.startsWith('https://')?esc(p.url):'#'}" target="_blank" rel="noreferrer">${img}</a><div class="body"><div class="src">${esc(p.source)} · #${esc(p.productNo)}</div><h2><a href="${p.url?.startsWith('https://')?esc(p.url):'#'}" target="_blank" rel="noreferrer">${esc(p.productName)}</a></h2><div class="row"><span class="price"><strong>${price}</strong><small>EUR shop price</small></span><span class="badge ${ok?'ok':''}">${ok?'Available':'Sold out'}</span></div></div></article>`}).join('')}fetch('status.json').then(r=>r.json()).then(data=>{products=(data.products||[]).filter(p=>sourceIds.includes(p.source));sources=(data.sources||sourceIds.map(source=>({source,productCount:products.filter(p=>p.source===source).length,availableCount:products.filter(p=>p.source===source&&stock(p)==='AVAILABLE').length,checkedAt:data.updatedAt,failing:false}))).filter(s=>sourceIds.includes(s.source));const last=sources.filter(s=>!s.failing&&s.checkedAt).map(s=>new Date(s.checkedAt)).filter(d=>!Number.isNaN(d)).sort((a,b)=>b-a)[0],fail=sources.filter(s=>s.failing).length;renderMonitor(data,last,fail);renderHealth(last,fail);[...new Set([...sourceIds,...products.map(p=>p.source)])].sort().forEach(s=>document.querySelector('#source').insertAdjacentHTML('beforeend',`<option>${esc(s)}</option>`));render()}).catch(e=>{document.querySelector('#monitor').innerHTML=`<strong>Status failed to load</strong><br><span>${esc(e)}</span>`});['search','source','availability','sort','minprice','maxprice'].forEach(id=>document.querySelector(`#${id}`).addEventListener(id==='search'||id.includes('price')?'input':'change',render));document.querySelector('#filter-toggle').addEventListener('click',e=>{e.stopPropagation();setFilters(!document.body.classList.contains('filters-open'))});document.querySelector('#filter-close').addEventListener('click',()=>setFilters(false));document.querySelector('#filters-done').addEventListener('click',()=>setFilters(false));document.querySelector('#filters').addEventListener('click',e=>e.stopPropagation());document.addEventListener('click',e=>{if(document.body.classList.contains('filters-open')&&!e.target.closest('#filters')&&!e.target.closest('#filter-toggle'))setFilters(false)});document.addEventListener('keydown',e=>{if(e.key==='Escape')setFilters(false)});document.querySelector('#clear').addEventListener('click',()=>{['search','source','availability','minprice','maxprice'].forEach(id=>document.querySelector(`#${id}`).value='');document.querySelector('#sort').value='name';render()});document.querySelector('#view').addEventListener('click',()=>setGallery(!document.body.classList.contains('gallery')));document.querySelector('#theme').addEventListener('click',()=>{const d=document.documentElement.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light')});if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');setGallery(localStorage.getItem('galleryView')==='true');
</script>
</body>
</html>
