<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <script>(function(){try{var t=localStorage.getItem('theme'),d=t?t==='dark':matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.documentElement.classList.add('dark');}catch(e){}})();</script>
  <title>Pokémon Product Monitor</title>
  <style>
    * { box-sizing:border-box }
    :root {
      color-scheme:light; font-family:Inter,system-ui,-apple-system,sans-serif;
      --bg:#fff; --text:#111827; --muted:#6b7280; --card:#f9fafb;
      --card-hover:#f0f0f0; --border:rgba(0,0,0,.07); --line:#e5e7eb;
      --accent:#7c3aed; --accent-rgb:124,58,237; --radius:.75rem;
      background:var(--bg); color:var(--text);
    }
    :root.dark {
      color-scheme:dark; --bg:#0a0a0a; --text:#fff; --muted:#a1a1aa;
      --card:#141414; --card-hover:#1e1e1e; --border:rgba(255,255,255,.07); --line:#27272a;
    }
    body { max-width:76rem; margin:auto; padding:3rem 1.5rem 5rem; background:var(--bg); color:var(--text); transition:background .3s,color .3s }
    header { display:flex; gap:1.25rem; justify-content:space-between; align-items:flex-start; margin-bottom:2rem }
    h1 { margin:0; font-size:1.75rem; font-weight:600; letter-spacing:0; display:flex; align-items:center }
    .brand-mark { display:inline-flex; width:1.25rem; height:1.25rem; margin-right:.55rem; color:var(--accent) }
    .brand-mark svg,.tool-icon svg { display:block; width:100%; height:100%; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round }
    #meta { color:var(--muted); font-size:.78rem; margin-top:.55rem }
    .header-actions { display:flex; align-items:center; gap:.45rem; flex-shrink:0 }
    .tool-btn { display:inline-flex; align-items:center; justify-content:center; gap:.35rem; min-height:2rem; padding:.4rem .7rem; border-radius:999px; border:1px solid var(--border); background:var(--card); color:var(--muted); font:500 .72rem/1 Inter,system-ui,sans-serif; cursor:pointer; white-space:nowrap }
    .tool-btn:hover { color:var(--accent); background:var(--card-hover) }
    .tool-icon { display:inline-flex; width:1rem; height:1rem }
    #view .view-list-icon { display:none }
    #view[aria-pressed="true"] .view-grid-icon { display:none }
    #view[aria-pressed="true"] .view-list-icon { display:inline-flex }
    .icon-btn { display:inline-flex; align-items:center; justify-content:center; width:2rem; height:2rem; padding:.35rem; border:0; border-radius:999px; background:none; color:var(--muted); cursor:pointer; font-size:.95rem; transition:color .2s,transform .3s }
    .icon-btn:hover { color:var(--accent); transform:rotate(20deg) scale(1.12) }
    #filter-toggle { display:none }
    .controls { display:grid; grid-template-columns:minmax(15rem,2fr) repeat(4,minmax(8rem,1fr)) repeat(2,minmax(7rem,.8fr)) auto; gap:.6rem; margin:0 0 1rem }
    input,select,button { font:inherit }
    .controls > * { width:100%; min-width:0; max-width:100% }
    .controls input,.controls select,.controls #clear { padding:.65rem .8rem; border-radius:.55rem; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:.75rem }
    .controls select { appearance:auto }
    .controls input:focus,.controls select:focus { outline:2px solid var(--accent); outline-offset:1px }
    button { cursor:pointer }
    .watch { display:block; margin-top:.75rem; padding:.6rem .75rem; border-radius:.55rem; text-align:center; background:var(--card-hover); color:var(--muted); font-size:.78rem }
    .watch.selected { color:var(--accent); border:1px solid rgba(var(--accent-rgb),.35); font-weight:600 }
    .monitor-note { display:block; margin-top:.75rem; color:var(--muted); font-size:.68rem; letter-spacing:.04em }
    #grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(13.5rem,1fr)); gap:.75rem }
    article { display:flex; flex-direction:column; border:1px solid var(--border); background:var(--card); border-radius:var(--radius); overflow:hidden; transition:background .2s,border-color .2s,transform .2s }
    article:hover { background:var(--card-hover); border-color:rgba(125,125,125,.3); transform:translateY(-2px) }
    .product-media { display:flex; aspect-ratio:1; align-items:center; justify-content:center; overflow:hidden; background:var(--card-hover) }
    .product-media img { width:100%; height:100%; object-fit:cover; background:white }
    .image-placeholder { color:var(--muted); font-size:1.5rem; opacity:.45 }
    .body { display:flex; flex:1; flex-direction:column; padding:.85rem }
    h2 { font-size:.9rem; line-height:1.35; min-height:2.45em; margin:0 0 .7rem; font-weight:600 }
    a { color:inherit; text-decoration:none }
    .row { display:flex; justify-content:space-between; gap:.65rem; align-items:center }
    .badge { padding:.24rem .55rem; border-radius:999px; font-size:.68rem; color:#b91c1c; background:rgba(220,38,38,.1); white-space:nowrap }
    .badge.available { color:#15803d; background:rgba(21,128,61,.1) }
    .badge.partial { color:#b45309; background:rgba(180,83,9,.1) }
    .badge.unknown { color:var(--muted); background:var(--card-hover) }
    .source { color:var(--muted); font-size:.66rem; letter-spacing:.04em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-bottom:.35rem }
    .prices { display:flex; flex-direction:column }
    .eur { color:var(--muted); font-size:.7rem }
    #stats { margin:0 0 1.25rem; color:var(--muted); font-size:.72rem; line-height:1.45 }
    #more { display:block; width:auto; margin:1.5rem auto 0 }
    body.gallery #grid { grid-template-columns:repeat(auto-fill,minmax(9.75rem,1fr)); gap:.5rem }
    body.gallery article { border-radius:.55rem }
    body.gallery .body { padding:.6rem }
    body.gallery h2 { display:-webkit-box; min-height:2.15em; max-height:2.15em; margin-bottom:.5rem; overflow:hidden; font-size:.78rem; line-height:1.08; -webkit-box-orient:vertical; -webkit-line-clamp:2 }
    body.gallery .source { overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    body.gallery .row { align-items:flex-start; flex-direction:column; gap:.35rem; margin-top:auto }
    body.gallery .watch { padding:.45rem; font-size:.68rem }
    body.gallery .monitor-note { margin-top:.5rem; font-size:.6rem }
    @media (max-width:1100px) {
      #filter-toggle { display:inline-flex }
      .controls {
        display:none; position:fixed; z-index:100; top:5rem; left:1rem; right:1rem;
        width:auto; max-height:calc(100dvh - 6rem); overflow-y:auto;
        grid-template-columns:minmax(0,1fr); gap:.55rem; margin:0; padding:.85rem;
        background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
        box-shadow:0 .5rem 2rem rgba(0,0,0,.16);
      }
      body.filters-open .controls { display:grid }
      .controls > * { inline-size:100%; min-inline-size:0 }
      #search { grid-column:auto }
    }
    @media (max-width:760px) {
      body { padding:2.5rem 1rem 4rem; overflow-x:hidden }
      header { align-items:center; margin-bottom:1.5rem }
      h1 { font-size:1.35rem }
      #meta { font-size:.68rem }
      .header-actions .tool-btn { width:2rem; padding:.4rem }
      .header-actions .tool-btn { border:0; background:none }
      .header-actions .tool-label { display:none }
      #grid { grid-template-columns:1fr; gap:.65rem }
      body.gallery #grid { grid-template-columns:repeat(2,minmax(0,1fr)) }
      body.gallery .eur { font-size:.7rem }
    }
    @media (prefers-reduced-motion:reduce) { article { transition:none } .icon-btn:hover { transform:none } }
  </style>
</head>
<body>
  <header>
    <div><h1><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="7" y="3" width="11" height="16" rx="2"/><path d="M10 7h5M10 11h5M5 7v12a2 2 0 0 0 2 2h7"/></svg></span>Card Monitor</h1><div id="meta">Loading…</div></div>
    <div class="header-actions">
      <button id="filter-toggle" class="tool-btn" type="button" aria-label="Open filters" aria-expanded="false" aria-controls="filters"><span class="tool-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h10M18 7h2M4 17h2M10 17h10"/><circle cx="16" cy="7" r="2"/><circle cx="8" cy="17" r="2"/></svg></span><span class="tool-label">Filters</span></button>
      <button id="view" class="tool-btn" type="button" aria-pressed="false"><span class="tool-icon view-grid-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg></span><span class="tool-icon view-list-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="5" cy="6" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="5" cy="18" r="1"/></svg></span><span id="view-label" class="tool-label">Gallery</span></button>
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle dark mode"><span id="theme-icon" aria-hidden="true">☾</span></button>
    </div>
  </header>
  <div class="controls" id="filters">
    <input id="search" type="search" placeholder="Search name or product number…">
    <select id="source"><option value="">All stores</option></select>
    <select id="currency"><option value="">Any currency</option><option value="KRW">KRW</option><option value="EUR">EUR</option></select>
    <select id="availability"><option value="">Any stock status</option><option value="available">Fully in stock</option><option value="partial">Some variants unavailable</option><option value="unavailable">Sold out</option><option value="unknown">Unknown</option></select>
    <select id="sort"><option value="name">Name A–Z</option><option value="price-asc">Price: low to high</option><option value="price-desc">Price: high to low</option><option value="stock">In stock first</option></select>
    <input id="minprice" type="number" min="0" step="1000" placeholder="Min ₩">
    <input id="maxprice" type="number" min="0" step="1000" placeholder="Max ₩">
    <button id="clear" type="button">Clear</button>
  </div>
  <div id="stats"></div>
  <main id="grid"></main>
  <button id="more" type="button" hidden>Show more products</button>
  <script>
    let products=[];
    let eurRate=null;
    let watched=new Set();
    let displayLimit=120;
    const configuredSources=[
      'crazycards-onepiece',
      'crazycards-pokemon',
      'naver-pokemon',
      'naver-xoplay',
      'pokemonstore',
      'spielwaren-onepiece-kor',
      'spielwaren-pokemon-kor'
    ];
    const money=new Intl.NumberFormat('ko-KR',{style:'currency',currency:'KRW',maximumFractionDigits:0});
    const euros=new Intl.NumberFormat('en-IE',{style:'currency',currency:'EUR'});
    const esc=value=>String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    function setTheme(dark){
      document.documentElement.classList.toggle('dark',dark);
      document.querySelector('#theme-toggle').setAttribute('aria-pressed',String(dark));
      document.querySelector('#theme-icon').textContent=dark?'☀':'☾';
      document.querySelector('#theme-toggle').setAttribute('aria-label',dark?'Use light mode':'Use dark mode');
      localStorage.setItem('theme',dark?'dark':'light');
    }
    function setFilters(open){
      document.body.classList.toggle('filters-open',open);
      document.querySelector('#filter-toggle').setAttribute('aria-expanded',String(open));
    }
    function setGallery(enabled){
      document.body.classList.toggle('gallery',enabled);
      const button=document.querySelector('#view');
      button.setAttribute('aria-pressed',String(enabled));
      button.setAttribute('aria-label',enabled?'Use details view':'Use gallery view');
      document.querySelector('#view-label').textContent=enabled?'Details':'Gallery';
      localStorage.setItem('galleryView',String(enabled));
    }
    function watchRequest(product){
      const active=watched.has(product.productNo);
      const action=active?'unwatch':'watch';
      const title=encodeURIComponent(`[${action}] ${product.productNo}`);
      const body=encodeURIComponent(`${active?'Stop watching':'Watch'} ${product.productName}\n\nProduct: ${product.url}\n\nThis request will be processed and closed automatically.`);
      return {active,url:`https://github.com/Jasa-S/pokemon-product-monitor/issues/new?title=${title}&body=${body}`};
    }
    function render(){
      const q=document.querySelector('#search').value.toLocaleLowerCase();
      const source=document.querySelector('#source').value;
      const currency=document.querySelector('#currency').value;
      const availability=document.querySelector('#availability').value;
      const minValue=document.querySelector('#minprice').value;
      const maxValue=document.querySelector('#maxprice').value;
      const min=minValue===''?0:Number(minValue);
      const max=maxValue===''?Infinity:Number(maxValue);
      const order=document.querySelector('#sort').value;
      const stockState=p=>p.stockStatus||(p.isSoldOut?'SOLD_OUT':'AVAILABLE');
      const matchesStock=p=>!availability||(availability==='available'&&stockState(p)==='AVAILABLE')||(availability==='partial'&&stockState(p)==='PARTIAL')||(availability==='unavailable'&&stockState(p)==='SOLD_OUT')||(availability==='unknown'&&stockState(p)==='UNKNOWN');
      const stockOrder={AVAILABLE:0,PARTIAL:1,SOLD_OUT:2,UNKNOWN:3};
      const visible=products.filter(p=>(!source||p.source===source)&&(!currency||(p.currency||'KRW')===currency)&&(p.productName.toLocaleLowerCase().includes(q)||p.productNo.includes(q))&&matchesStock(p)&&((minValue===''&&maxValue==='')||(p.salePrice!=null&&p.salePrice>=min&&p.salePrice<=max)));
      visible.sort((a,b)=>order==='price-asc'?(a.salePrice??Infinity)-(b.salePrice??Infinity):order==='price-desc'?(b.salePrice??-1)-(a.salePrice??-1):order==='stock'?(stockOrder[stockState(a)]??9)-(stockOrder[stockState(b)]??9):a.productName.localeCompare(b.productName));
      const available=visible.filter(p=>stockState(p)==='AVAILABLE').length;
      const partial=visible.filter(p=>stockState(p)==='PARTIAL').length;
      const unavailable=visible.filter(p=>stockState(p)==='SOLD_OUT').length;
      const unknown=visible.filter(p=>stockState(p)==='UNKNOWN').length;
      const shown=visible.slice(0,displayLimit);
      document.querySelector('#stats').textContent=`Showing ${shown.length.toLocaleString()} of ${visible.length.toLocaleString()} matches · ${available.toLocaleString()} fully in stock · ${partial.toLocaleString()} partial · ${unavailable.toLocaleString()} sold out · ${unknown.toLocaleString()} unknown`;
      document.querySelector('#grid').innerHTML=shown.map(p=>{const request=watchRequest(p);const state=stockState(p);const label=state==='PARTIAL'?`Partial (${p.availableOptionCount??'?'} available / ${p.soldOutOptionCount??'?'} sold out)`:state==='SOLD_OUT'?'Sold out':state==='UNKNOWN'?'Unknown':'Available';const badge=state==='AVAILABLE'?'available':state==='PARTIAL'?'partial':state==='UNKNOWN'?'unknown':'';const isEuro=p.currency==='EUR';const primary=p.salePrice==null?'—':isEuro?euros.format(p.salePrice):money.format(p.salePrice);const secondary=isEuro?'EUR shop price':p.salePrice!=null&&eurRate?`≈ ${euros.format(p.salePrice*eurRate)}`:'EUR unavailable';const monitoring=p.source==='pokemonstore'?`<a class="watch ${request.active?'selected':''}" href="${request.url}" target="_blank" rel="noreferrer">${request.active?'✓ Exact restock watched — remove':'Watch exact restock via GitHub'}</a>`:'<span class="monitor-note">● Monitored automatically</span>';const media=p.image?.startsWith('https://')?`<img loading="lazy" src="${esc(p.image)}" alt="${esc(p.productName)}">`:'<span class="image-placeholder" aria-hidden="true">▧</span>';return `<article><a class="product-media" href="${p.url.startsWith('https://')?esc(p.url):'#'}" target="_blank" rel="noreferrer" aria-label="${esc(p.productName)}">${media}</a><div class="body"><div class="source">${esc(p.source)} · #${esc(p.productNo)}</div><h2><a href="${p.url.startsWith('https://')?esc(p.url):'#'}" target="_blank" rel="noreferrer">${esc(p.productName)}</a></h2><div class="row"><span class="prices"><strong>${primary}</strong><span class="eur">${secondary}</span></span><span class="badge ${badge}">${esc(label)}</span></div>${monitoring}</div></article>`}).join('');
      const more=document.querySelector('#more');
      more.hidden=shown.length===visible.length;
      more.textContent=`Show ${Math.min(120,visible.length-shown.length).toLocaleString()} more products`;
    }
    Promise.all([
      fetch('status.json').then(r=>r.json()),
      fetch('local-naver.json').then(r=>r.ok?r.json():{products:[]}).catch(()=>({products:[]}))
    ]).then(([data,localNaver])=>{
      const localSources=new Set((localNaver.products||[]).map(p=>p.source));
      products=[...data.products.filter(p=>!localSources.has(p.source)),...(localNaver.products||[])];
      watched=new Set(data.watchProductNos||[]);
      eurRate=data.exchangeRate?.rate||null;
      const rateNote=data.exchangeRate?` · EUR reference ${data.exchangeRate.date}`:'';
      const updated=[data.updatedAt,localNaver.updatedAt].filter(Boolean).sort().pop();
      document.querySelector('#meta').textContent=`${products.length.toLocaleString()} tracked · updated ${new Date(updated).toLocaleString()}${rateNote}`;
      [...new Set([...configuredSources,...products.map(p=>p.source)])].sort().forEach(s=>document.querySelector('#source').insertAdjacentHTML('beforeend',`<option>${esc(s)}</option>`));
      render();
    });
    ['search','source','currency','availability','sort','minprice','maxprice'].forEach(id=>document.querySelector(`#${id}`).addEventListener(id==='search'||id.includes('price')?'input':'change',()=>{displayLimit=120;render()}));
    document.querySelector('#more').addEventListener('click',()=>{displayLimit+=120;render()});
    document.querySelector('#view').addEventListener('click',()=>setGallery(!document.body.classList.contains('gallery')));
    document.querySelector('#theme-toggle').addEventListener('click',()=>setTheme(!document.documentElement.classList.contains('dark')));
    document.querySelector('#filter-toggle').addEventListener('click',event=>{event.stopPropagation();setFilters(!document.body.classList.contains('filters-open'))});
    document.querySelector('#filters').addEventListener('click',event=>event.stopPropagation());
    document.addEventListener('click',()=>setFilters(false));
    document.addEventListener('keydown',event=>{if(event.key==='Escape')setFilters(false)});
    document.querySelector('#clear').addEventListener('click',()=>{
      ['search','source','currency','availability','minprice','maxprice'].forEach(id=>document.querySelector(`#${id}`).value='');
      document.querySelector('#sort').value='name'; displayLimit=120; render(); setFilters(false);
    });
    const initialDark=document.documentElement.classList.contains('dark');
    document.querySelector('#theme-toggle').setAttribute('aria-pressed',String(initialDark));
    document.querySelector('#theme-icon').textContent=initialDark?'☀':'☾';
    document.querySelector('#theme-toggle').setAttribute('aria-label',initialDark?'Use light mode':'Use dark mode');
    setGallery(localStorage.getItem('galleryView')===null?matchMedia('(max-width: 520px)').matches:localStorage.getItem('galleryView')==='true');
  </script>
</body>
</html>
